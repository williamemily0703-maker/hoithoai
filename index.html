<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Ngoại Ngữ Chuyên Sâu với AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; color: #2c3e50; }
        h1 { text-align: center; color: #1a365d; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .lang-box { flex: 1 1 30%; min-width: 280px; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .lang-box h3 { margin-top: 0; font-size: 16px; color: #2b6cb0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        textarea { width: 100%; height: 120px; padding: 12px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; resize: vertical; font-family: inherit; line-height: 1.5; }
        
        .controls { background: #fff; padding: 25px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .controls h3 { margin-top: 0; color: #2d3748; font-size: 16px; margin-bottom: 15px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .checkbox-group label { cursor: pointer; user-select: none; background: #edf2f7; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .checkbox-group input:checked + label { background: #3182ce; color: white; }
        
        button { background-color: #38a169; color: white; border: none; padding: 10px 20px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-right: 8px; margin-bottom: 8px; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); filter: brightness(1.1); }
        
        /* Practice Panel */
        .practice-panel { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #cbd5e1; display: none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; background: #ebf8ff; padding: 20px; border-radius: 10px; }
        .practice-panel select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; font-family: inherit; }
        .practice-panel .form-group { display: flex; flex-direction: column; }
        .practice-panel label { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #4a5568; }

        .table-container { overflow-x: auto; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #e2e8f0; padding: 16px; text-align: left; vertical-align: top; line-height: 1.6; }
        th { background-color: #2d3748; color: white; position: sticky; top: 0; z-index: 10; }
        .speaker-col { font-weight: bold; color: #c53030; white-space: nowrap; width: 120px; text-align: center; }
        
        tbody tr { transition: 0.2s; cursor: pointer; }
        tbody tr:hover { background-color: #f7fafc; }
        tbody tr.playing { background-color: #fefcbf !important; border-left: 4px solid #d69e2e; }
        tbody tr.waiting-user { background-color: #e6fffa !important; border-left: 4px solid #38b2ac; }
        
        /* Action Area */
        .hidden-text { filter: blur(6px); opacity: 0.6; transition: 0.3s; user-select: none; }
        .hidden-text:hover { filter: blur(0px); opacity: 1; }
        .action-area { margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        
        .record-btn { background-color: #e53e3e; padding: 8px 16px; font-size: 13px; border-radius: 20px; display: inline-flex; align-items: center; }
        .record-btn.recording { animation: pulse 1.5s infinite; background-color: #fc8181; }
        .play-record-btn { background-color: #4299e1; padding: 8px 16px; font-size: 13px; border-radius: 20px; display: none; }
        .score-badge { font-weight: bold; font-size: 14px; padding: 6px 12px; border-radius: 10px; display: none; }
        
        /* Box phản hồi chi tiết */
        .feedback-box { width: 100%; margin-top: 10px; padding: 12px; background: #fdfefe; border: 1px dashed #cbd5e1; border-radius: 8px; font-size: 14px; display: none; }
        .word-correct { color: #276749; font-weight: bold; }
        .word-wrong { color: #c53030; text-decoration: line-through; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>🎙️ Phòng Luyện Phát Âm & Phân Vai AI</h1>

    <div class="controls">
        <h3>1. Nhập liệu & Chọn ngôn ngữ</h3>
        <div class="checkbox-group" id="language-selectors"></div>
        
        <button onclick="generateTable()">Tạo Bảng Dữ Liệu</button>
        <button onclick="exportScript()" style="background-color: #2b6cb0;">💾 Tải Script Về Máy</button>
        <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importScript(event)">
        <button onclick="document.getElementById('import-file').click()" style="background-color: #ed8936;">📂 Nhập Script Có Sẵn</button>

        <div class="practice-panel" id="practice-panel">
            <div class="form-group">
                <label>Ngôn ngữ muốn học:</label>
                <select id="read-lang-select" onchange="updatePracticeUI()"></select>
            </div>
            <div class="form-group">
                <label>Đóng vai (Luyện nói):</label>
                <select id="user-role-select" onchange="updatePracticeUI()">
                    <option value="none">Không (Chỉ nghe máy đọc)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="label-voice-1">Giọng Máy 1:</label>
                <select id="voice-1"></select>
            </div>
            <div class="form-group">
                <label id="label-voice-2">Giọng Máy 2:</label>
                <select id="voice-2"></select>
            </div>
            <div class="form-group" style="grid-column: 1 / -1; flex-direction: row; gap: 15px; border-top: 1px solid #cbd5e1; padding-top: 20px; margin-top: 10px; flex-wrap: wrap;">
                <button onclick="startInteractivePractice()" style="background-color: #d69e2e;">▶ Thực Hành (Máy hỏi - Bạn trả lời)</button>
                <button onclick="playReviewSession()" style="background-color: #805ad5;">🎧 Nghe Lại Toàn Bộ Hội Thoại</button>
                <button onclick="stopAll()" style="background-color: #718096;">⏹ Dừng</button>
            </div>
        </div>
    </div>

    <div class="container" id="input-container"></div>

    <div class="table-container" id="table-container" style="display: none;">
        <table id="result-table">
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const languages = ["Tiếng Việt", "Tiếng Anh", "Tiếng Đức", "Tiếng Hàn", "Tiếng Nhật", "Tiếng Thái", "Tiếng Trung", "Tiếng Pháp", "Tiếng Tây Ban Nha", "Tiếng Hindi", "Tiếng Ả Rập", "Tiếng Ý", "Tiếng Nga", "Tiếng Filipino"];
        
        const langCodeMap = {
            "Tiếng Việt": "vi-VN", "Tiếng Anh": "en-US", "Tiếng Đức": "de-DE", "Tiếng Hàn": "ko-KR", 
            "Tiếng Nhật": "ja-JP", "Tiếng Thái": "th-TH", "Tiếng Trung": "zh-CN", "Tiếng Pháp": "fr-FR", 
            "Tiếng Tây Ban Nha": "es-ES", "Tiếng Ý": "it-IT", "Tiếng Nga": "ru-RU",
            "Tiếng Ả Rập": "ar-SA", "Tiếng Filipino": "fil-PH", "Tiếng Hindi": "hi-IN"
        };

        let globalParsedData = {}; 
        let availableVoices = [];
        let currentUtterance = null; 
        let isPlaying = false;
        let isInteractiveMode = false;
        let speakersList = []; 
        
        let mediaRecorder;
        let audioChunks = [];
        let userRecordings = {}; 
        let currentAudioPlayer = null; 
        
        let recognition;
        let finalTranscript = "";
        let interimTranscript = "";

        function init() {
            const selectorContainer = document.getElementById('language-selectors');
            const inputContainer = document.getElementById('input-container');

            languages.forEach((lang, index) => {
                const isChecked = (index === 0 || index === 1) ? 'checked' : ''; 
                selectorContainer.insertAdjacentHTML('beforeend', `
                    <div>
                        <input type="checkbox" value="${lang}" class="lang-check" id="chk-${lang}" ${isChecked} style="display:none;">
                        <label for="chk-${lang}">${lang}</label>
                    </div>
                `);

                const box = document.createElement('div');
                box.className = 'lang-box';
                box.innerHTML = `<h3>${lang}</h3><textarea id="text-${lang}" placeholder="Dán văn bản ${lang}..."></textarea>`;
                inputContainer.appendChild(box);
            });

            populateVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;
        }

        // TÍNH NĂNG MỚI: XUẤT SCRIPT
        function exportScript() {
            const dataToSave = {};
            languages.forEach(lang => {
                const checkbox = document.getElementById(`chk-${lang}`);
                const textarea = document.getElementById(`text-${lang}`);
                if (checkbox && textarea) {
                    dataToSave[lang] = {
                        checked: checkbox.checked,
                        text: textarea.value
                    };
                }
            });

            const dataStr = JSON.stringify(dataToSave, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "phong_luyen_am_script.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // TÍNH NĂNG MỚI: NHẬP SCRIPT
        function importScript(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    languages.forEach(lang => {
                        if (importedData[lang]) {
                            const checkbox = document.getElementById(`chk-${lang}`);
                            const textarea = document.getElementById(`text-${lang}`);
                            if (checkbox) checkbox.checked = importedData[lang].checked;
                            if (textarea) textarea.value = importedData[lang].text;
                        }
                    });
                    alert("Đã nhập dữ liệu thành công! Hãy bấm 'Tạo Bảng Dữ Liệu' để bắt đầu.");
                } catch (error) {
                    alert("File không hợp lệ hoặc bị lỗi!");
                }
                // Xoá value để có thể import lại cùng 1 file nếu cần
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function populateVoices() {
            availableVoices = speechSynthesis.getVoices();
            const voiceSelects = [document.getElementById('voice-1'), document.getElementById('voice-2')];
            if(availableVoices.length === 0) return;

            voiceSelects.forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '';
                availableVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    let name = voice.name.includes('Microsoft') ? "⭐ " + voice.name : voice.name; 
                    option.textContent = `${name} (${voice.lang})`;
                    select.appendChild(option);
                });
                if (currentVal) select.value = currentVal;
            });
        }

        function parseDialogue(text) {
            const lines = text.split('\n');
            const result = [];
            let currentSpeaker = ""; let currentText = "";
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (/^(Cảnh|Szene|Scene|场景)/i.test(line)) continue;

                const match = line.match(/^([^:：]{1,30})[:：](.*)$/);
                if (match) {
                    if (currentSpeaker) result.push({ speaker: currentSpeaker, text: currentText.trim() });
                    currentSpeaker = match[1].trim();
                    currentText = match[2].trim();
                } else {
                    if (currentSpeaker) currentText += (currentText ? " " : "") + line;
                }
            }
            if (currentSpeaker) result.push({ speaker: currentSpeaker, text: currentText.trim() });
            return result;
        }

        function generateTable() {
            stopAll();
            const checkboxes = document.querySelectorAll('.lang-check:checked');
            const selectedLangs = Array.from(checkboxes).map(cb => cb.value);

            if (selectedLangs.length === 0) { alert("Vui lòng chọn ít nhất 1 ngôn ngữ!"); return; }

            globalParsedData = {};
            let maxTurns = 0;
            speakersList = [];
            userRecordings = {}; 

            selectedLangs.forEach(lang => {
                const text = document.getElementById(`text-${lang}`).value;
                const turns = parseDialogue(text);
                globalParsedData[lang] = turns;
                if (turns.length > maxTurns) maxTurns = turns.length;
                
                turns.forEach(t => { if(!speakersList.includes(t.speaker) && speakersList.length < 2) speakersList.push(t.speaker); });
            });

            const thead = document.getElementById('table-head');
            thead.innerHTML = '<th class="speaker-col">Nhân Vật</th>';
            
            const readLangSelect = document.getElementById('read-lang-select');
            readLangSelect.innerHTML = '';
            
            const roleSelect = document.getElementById('user-role-select');
            roleSelect.innerHTML = '<option value="none">Không (Chỉ nghe máy đọc)</option>';

            selectedLangs.forEach(lang => {
                thead.insertAdjacentHTML('beforeend', `<th>${lang}</th>`);
                readLangSelect.insertAdjacentHTML('beforeend', `<option value="${lang}">${lang}</option>`);
            });

            speakersList.forEach(spk => { roleSelect.insertAdjacentHTML('beforeend', `<option value="${spk}">Đóng vai: ${spk}</option>`); });

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            for (let i = 0; i < maxTurns; i++) {
                const tr = document.createElement('tr');
                tr.id = `row-${i}`;
                
                tr.onclick = (e) => {
                    if(e.target.tagName !== 'BUTTON' && !e.target.closest('.action-area')) {
                        readSingleTurn(i);
                    }
                };
                
                let speakerName = "";
                for (let lang of selectedLangs) {
                    if (globalParsedData[lang][i] && globalParsedData[lang][i].speaker) { speakerName = globalParsedData[lang][i].speaker; break; }
                }
                
                tr.insertAdjacentHTML('beforeend', `<td class="speaker-col" data-speaker="${speakerName}">${speakerName}</td>`);

                selectedLangs.forEach(lang => {
                    let text = globalParsedData[lang][i] ? globalParsedData[lang][i].text : "-";
                    tr.insertAdjacentHTML('beforeend', `
                        <td class="lang-cell" data-lang="${lang}">
                            <div class="text-content">${text}</div>
                            <div class="action-area" style="display:none;"></div>
                        </td>`);
                });

                tbody.appendChild(tr);
            }

            document.getElementById('table-container').style.display = 'block';
            document.getElementById('practice-panel').style.display = 'grid';
            
            if(speakersList[0]) document.getElementById('label-voice-1').innerText = `Giọng ${speakersList[0]}:`;
            if(speakersList[1]) document.getElementById('label-voice-2').innerText = `Giọng ${speakersList[1]}:`;

            updatePracticeUI(); 
        }

        function updatePracticeUI() {
            const userRole = document.getElementById('user-role-select').value;
            const targetLang = document.getElementById('read-lang-select').value;

            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach((tr, index) => {
                const speaker = tr.querySelector('.speaker-col').getAttribute('data-speaker');
                const cells = tr.querySelectorAll('.lang-cell');
                
                cells.forEach(cell => {
                    const lang = cell.getAttribute('data-lang');
                    const textDiv = cell.querySelector('.text-content');
                    const actionArea = cell.querySelector('.action-area');
                    
                    textDiv.classList.remove('hidden-text');
                    actionArea.style.display = 'none';
                    actionArea.innerHTML = '';

                    if (userRole !== 'none' && speaker === userRole && lang === targetLang) {
                        textDiv.classList.add('hidden-text');
                        actionArea.style.display = 'flex';
                        actionArea.innerHTML = `
                            <button class="record-btn" id="btn-rec-${index}" onclick="toggleRecord(${index}, event)">🔴 Thu âm</button>
                            <button class="play-record-btn" id="btn-play-${index}" onclick="playUserAudio(${index}, event)" ${userRecordings[index] ? 'style="display:inline-flex;"' : ''}>▶ Nghe Lại</button>
                            <span class="score-badge" id="score-${index}"></span>
                            <div class="feedback-box" id="feedback-${index}"></div>
                        `;
                    }
                });
            });
        }

        function analyzeSpeechAndGenerateHTML(originalText, spokenText) {
            if (!spokenText || spokenText.trim() === "") return { score: 0, html: "<em>Không nghe thấy âm thanh. Vui lòng thử lại.</em>", raw: "" };
            
            const cleanOrgWords = originalText.split(/\s+/);
            const cleanSpkWords = spokenText.toLowerCase().replace(/[.,!?()（）"']/g, "").split(/\s+/);

            let matchCount = 0;
            let diffHtml = "";

            cleanOrgWords.forEach(orgWord => {
                const cleanWord = orgWord.toLowerCase().replace(/[.,!?()（）"']/g, "");
                if(!cleanWord) {
                    diffHtml += orgWord + " ";
                    return;
                }

                let found = false;
                for(let i = 0; i < cleanSpkWords.length; i++) {
                    if(cleanSpkWords[i] === cleanWord) {
                        found = true;
                        cleanSpkWords[i] = null; 
                        break;
                    }
                }

                if(found) {
                    matchCount++;
                    diffHtml += `<span class="word-correct">${orgWord}</span> `;
                } else {
                    diffHtml += `<span class="word-wrong">${orgWord}</span> `;
                }
            });

            let validWordCount = cleanOrgWords.filter(w => w.replace(/[.,!?()（）"']/g, "") !== "").length;
            let score = validWordCount === 0 ? 0 : Math.round((matchCount / validWordCount) * 100);
            
            return { score: score > 100 ? 100 : score, html: diffHtml.trim(), raw: spokenText };
        }

        async function toggleRecord(index, event) {
            if(event) event.stopPropagation(); 

            const btn = document.getElementById(`btn-rec-${index}`);
            const targetLang = document.getElementById('read-lang-select').value;
            const originalText = globalParsedData[targetLang][index].text.replace(/\\(.*?\\)|\\（.*?\\）/g, "");
            
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if(recognition) recognition.stop();
                btn.classList.remove('recording');
                btn.innerHTML = '🔴 Thu lại';
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                finalTranscript = "";
                interimTranscript = "";

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognition = new SpeechRecognition();
                    recognition.continuous = true; 
                    recognition.interimResults = true;
                    recognition.lang = langCodeMap[targetLang] || 'en-US';

                    recognition.onresult = (e) => {
                        let currentInterim = "";
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal) {
                                finalTranscript += e.results[i][0].transcript + " ";
                            } else {
                                currentInterim += e.results[i][0].transcript;
                            }
                        }
                        interimTranscript = currentInterim; 
                    };

                    recognition.onerror = (e) => {
                        console.warn("Lỗi nhận diện giọng nói: ", e.error);
                    };

                    recognition.start();
                }

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    userRecordings[index] = URL.createObjectURL(audioBlob); 
                    
                    document.getElementById(`btn-play-${index}`).style.display = 'inline-flex';
                    stream.getTracks().forEach(track => track.stop());
                    
                    let textToAnalyze = (finalTranscript + " " + interimTranscript).trim();

                    setTimeout(() => {
                        let analysis = analyzeSpeechAndGenerateHTML(originalText, textToAnalyze);
                        
                        const scoreBadge = document.getElementById(`score-${index}`);
                        const feedbackBox = document.getElementById(`feedback-${index}`);
                        
                        scoreBadge.style.display = 'inline-block';
                        feedbackBox.style.display = 'block';
                        
                        if(analysis.score >= 80) { scoreBadge.style.background = '#c6f6d5'; scoreBadge.style.color = '#22543d'; scoreBadge.innerText = `Tuyệt vời: ${analysis.score}%`; }
                        else if(analysis.score >= 50) { scoreBadge.style.background = '#fefcbf'; scoreBadge.style.color = '#744210'; scoreBadge.innerText = `Khá tốt: ${analysis.score}%`; }
                        else { scoreBadge.style.background = '#fed7d7'; scoreBadge.style.color = '#742a2a'; scoreBadge.innerText = `Sai nhiều: ${analysis.score}%`; }
                        
                        feedbackBox.innerHTML = `
                            <div style="margin-bottom: 8px;"><strong>Hệ thống nghe được:</strong> <span style="color:#4a5568;">"${analysis.raw || "Không rõ tiếng"}"</span></div>
                            <div><strong>Chẩn đoán lỗi:</strong> ${analysis.html}</div>
                        `;
                        
                        if(isInteractiveMode) {
                            setTimeout(() => {
                                document.getElementById(`row-${index}`).classList.remove('waiting-user');
                                processInteractiveTurn(index + 1);
                            }, 3000); 
                        }
                    }, 500); 
                };

                mediaRecorder.start();
                btn.classList.add('recording');
                btn.innerHTML = '⬛ Dừng';
            } catch (err) { alert("Lỗi Micro: Vui lòng cho phép quyền truy cập Micro trên trình duyệt!"); }
        }

        function playUserAudio(index, event) {
            if(event) event.stopPropagation();
            if (currentAudioPlayer) currentAudioPlayer.pause();
            if (userRecordings[index]) {
                currentAudioPlayer = new Audio(userRecordings[index]);
                currentAudioPlayer.play();
            }
        }

        function stopAll() {
            window.speechSynthesis.cancel();
            if (currentAudioPlayer) currentAudioPlayer.pause();
            isPlaying = false;
            isInteractiveMode = false;
            document.querySelectorAll('#table-body tr').forEach(tr => { tr.classList.remove('playing', 'waiting-user'); });
            if(recognition) recognition.stop();
        }

        function readSingleTurn(index) {
            stopAll();
            const selectedLang = document.getElementById('read-lang-select').value;
            const turn = globalParsedData[selectedLang][index];
            if(!turn || !turn.text || turn.text === "-") return;

            const v1Index = document.getElementById('voice-1').value;
            const v2Index = document.getElementById('voice-2').value;
            let selectedVoiceIndex = (speakersList.length > 1 && turn.speaker === speakersList[1]) ? v2Index : v1Index; 

            document.getElementById(`row-${index}`).classList.add('playing');

            let textToSpeak = turn.text.replace(/\\(.*?\\)|\\（.*?\\）/g, "").trim();
            currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
            if(availableVoices[selectedVoiceIndex]) currentUtterance.voice = availableVoices[selectedVoiceIndex];
            
            currentUtterance.onend = () => document.getElementById(`row-${index}`).classList.remove('playing');
            window.speechSynthesis.speak(currentUtterance);
        }

        function startInteractivePractice() {
            stopAll();
            isPlaying = true;
            isInteractiveMode = true;
            processInteractiveTurn(0);
        }

        function processInteractiveTurn(index) {
            if (!isPlaying) return;
            const selectedLang = document.getElementById('read-lang-select').value;
            const dataArray = globalParsedData[selectedLang];
            const userRole = document.getElementById('user-role-select').value;
            
            if (index >= dataArray.length) { stopAll(); alert("Chúc mừng! Bạn đã hoàn thành bài thực hành."); return; }

            document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('playing', 'waiting-user'));
            const currentRow = document.getElementById(`row-${index}`);
            if(currentRow) currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const turn = dataArray[index];
            if(!turn || turn.text === "-") { processInteractiveTurn(index + 1); return; }

            if (turn.speaker === userRole) {
                currentRow.classList.add('waiting-user');
            } else {
                currentRow.classList.add('playing');
                let textToSpeak = turn.text.replace(/\\(.*?\\)|\\（.*?\\）/g, "").trim();
                currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
                
                let v1 = document.getElementById('voice-1').value;
                let v2 = document.getElementById('voice-2').value;
                let voiceIndex = (speakersList.length > 1 && turn.speaker === speakersList[1]) ? v2 : v1; 
                
                if(availableVoices[voiceIndex]) currentUtterance.voice = availableVoices[voiceIndex];

                currentUtterance.onend = () => processInteractiveTurn(index + 1);
                currentUtterance.onerror = () => stopAll();
                window.speechSynthesis.speak(currentUtterance);
            }
        }

        function playReviewSession(index = 0) {
            if(index === 0) { stopAll(); isPlaying = true; isInteractiveMode = false; }
            if (!isPlaying) return;
            
            const selectedLang = document.getElementById('read-lang-select').value;
            const dataArray = globalParsedData[selectedLang];
            const userRole = document.getElementById('user-role-select').value;
            
            if (index >= dataArray.length) { stopAll(); return; }

            document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('playing'));
            const currentRow = document.getElementById(`row-${index}`);
            if(currentRow) { currentRow.classList.add('playing'); currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' }); }

            const turn = dataArray[index];
            if(!turn || turn.text === "-") { playReviewSession(index + 1); return; }

            if (turn.speaker === userRole) {
                if (userRecordings[index]) {
                    currentAudioPlayer = new Audio(userRecordings[index]);
                    currentAudioPlayer.onended = () => playReviewSession(index + 1);
                    currentAudioPlayer.play();
                } else {
                    playReviewSession(index + 1);
                }
            } else {
                let textToSpeak = turn.text.replace(/\\(.*?\\)|\\（.*?\\）/g, "").trim();
                currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
                let v1 = document.getElementById('voice-1').value;
                let v2 = document.getElementById('voice-2').value;
                let voiceIndex = (speakersList.length > 1 && turn.speaker === speakersList[1]) ? v2 : v1; 
                if(availableVoices[voiceIndex]) currentUtterance.voice = availableVoices[voiceIndex];

                currentUtterance.onend = () => playReviewSession(index + 1);
                currentUtterance.onerror = () => stopAll();
                window.speechSynthesis.speak(currentUtterance);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
